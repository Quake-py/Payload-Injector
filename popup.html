<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
    }

    body {
      width: 250px;
      margin: 0;
      padding: 16px;
      background-color: var(--bg-primary);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, sans-serif;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 4px 0;
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      text-align: center;
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-sizing: border-box;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: var(--border-color);
    }

    .btn-primary {
      background-color: var(--accent);
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
    }

    .footer {
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="title">Payload Injector</div>
  <div class="subtitle">QA & Input Validation Test Aracı</div>

  <button class="btn btn-primary" id="btnOpenOptions">⚙️ Ayarlar Sayfası</button>
  <button class="btn" id="btnOpenGithub">🐙 GitHub Deposu</button>

  <div class="footer" id="versionText">v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
